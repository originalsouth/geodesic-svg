name: Deploy to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Emscripten
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: latest

      - name: Build WASM
        run: make

      - name: Assemble site
        run: |
          mkdir -p _site
          cp geodesic-svg.svg geodesic-svg.js geodesic-svg.wasm geodesic-svg_interface.js _site/
          cat > _site/index.html <<'EOF'
          <!doctype html>
          <meta charset="utf-8">
          <title>geodesic-svg</title>
          <meta http-equiv="refresh" content="0; url=geodesic-svg.svg">
          <link rel="canonical" href="geodesic-svg.svg">
          EOF

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
